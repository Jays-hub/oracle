# Kitchen capacity caps per item per service period
capacity_caps:
  braised_short_rib: 18
  pan_seared_salmon: 20
  half_roast_chicken: 22
  house_burger: 36
  ribeye_steak_12oz: 14
  duck_confit: 13
  butter_poached_cod: 16
  wild_mushroom_risotto: 24
  classic_caesar_salad: 55
  pappardelle_bolognese: 28
  tuna_tartare: 11

# Effective sellable capacity = round(capacity_cap * censoring_threshold): the kitchen 86s a
# touch before the nominal prep cap. A day is censored iff true_demand > effective_cap, and
# observed_demand is then pinned to effective_cap — so every truth_stockouts row is a genuine
# censoring event (observed < true), never a near-cap non-event.
censoring_threshold: 0.94

pollution:
  comp_rate: 0.045
  comp_flagged_rate: 0.60
  staff_meal_rate: 0.025
  void_rate: 0.015
  staff_server_ids: ["S001", "S002"]

weather:
  base_temp_high_summer: 82.0
  base_temp_high_winter: 35.0
  temp_daily_noise_std: 4.0
  precip_daily_prob: 0.25
  precip_gamma_shape: 2.0
  precip_gamma_scale: 3.0
  forecast_temp_noise_std: 3.0
  forecast_precip_noise_lognormal_sigma: 0.30
  rain_threshold_mm: 5.0
  rain_demand_factor: 0.88
  heat_threshold_f: 90.0
  heat_demand_factor: 0.93
  first_warm_day_trigger_f: 58.0
  first_warm_day_cold_window_avg_f: 48.0
  first_warm_day_factor: 1.12

