    dinner_mu: 18.0
    dispersion: 10.0
    zero_prob: 0.0
  ribeye_steak_12oz:
    lunch_mu: 3.0
    dinner_mu: 8.0
    dispersion: 6.0
    zero_prob: 0.0
  duck_confit:
    lunch_mu: 2.5
    dinner_mu: 7.0
    dispersion: 5.0
    zero_prob: 0.05
  butter_poached_cod:
    lunch_mu: 4.5
    dinner_mu: 8.0
    dispersion: 7.0
    zero_prob: 0.0
  wild_mushroom_risotto:
