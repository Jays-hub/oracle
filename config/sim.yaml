    hour_start: 11
    hour_end: 15
  - name: dinner
    hour_start: 17
    hour_end: 22

# NegBin demand: rng.negative_binomial(n=dispersion, p=dispersion/(dispersion+mu))
# zero_prob: probability of structural zero (zero-inflation for intermittent items)
item_demand:
  braised_short_rib:
    lunch_mu: 5.0
    dinner_mu: 11.0
    dispersion: 7.0
    zero_prob: 0.0
  pan_seared_salmon:
    lunch_mu: 6.0
    dinner_mu: 10.0
    dispersion: 8.0
    zero_prob: 0.0
  half_roast_chicken:
    lunch_mu: 7.0
    dinner_mu: 12.0
    dispersion: 9.0
    zero_prob: 0.0
  house_burger:
