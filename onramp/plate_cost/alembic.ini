[alembic]
# Migrations for the on-ramp's app DB (W5) — on-ramp-private, never the seam.
# Run from onramp/plate_cost/: `conda run -n restaurant-dev alembic upgrade head`
# (or `make migrate` from the repo root). sqlalchemy.url is intentionally left blank here —
# migrations/env.py resolves it at runtime via src.db.engine.resolve_database_url(), the same
# ONRAMP_DATABASE_URL-or-local-default logic the app itself uses, so there is exactly one place
# the URL is derived (never two configs that can drift apart).
script_location = migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
