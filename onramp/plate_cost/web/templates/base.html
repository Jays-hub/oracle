<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Plate Cost{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <span class="wordmark">Plate Cost</span>
    <nav class="site-nav">
      {% if logged_in %}
        <a href="/your-data">Your data</a>
        <a href="/invoice/upload">Upload invoice</a>
        <a href="/insights">Insights</a>
        <form method="post" action="/logout" class="logout-form"><button type="submit">Log out</button></form>
      {% else %}
        <a href="/login">Log in</a>
      {% endif %}
    </nav>
  </header>
  {% block sample_banner %}
  <div class="sample-banner" role="note">
    Sample data — illustrative only, not your restaurant's numbers
  </div>
  {% endblock %}
  <main>{% block content %}{% endblock %}</main>
  <footer class="site-footer">{% block footer %}{% endblock %}</footer>
</body>
</html>
