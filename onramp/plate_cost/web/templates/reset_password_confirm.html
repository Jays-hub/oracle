{% extends "base.html" %}
{% block title %}Set a new password{% endblock %}

{% block sample_banner %}{% endblock %}

{% block content %}
<section class="page-intro">
  <h1>Set a new password</h1>
</section>

{% if error %}
<section class="skipped-notice" role="alert">{{ error }}</section>
{% endif %}

<form method="post" action="/reset-password/{{ token }}" class="upload-form">
  <div class="upload-field">
    <label for="new_password">New password</label>
    <input type="password" id="new_password" name="new_password" autocomplete="new-password" required minlength="8">
  </div>
  <button type="submit" class="btn-primary">Set password</button>
</form>
{% endblock %}
