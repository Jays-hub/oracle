{% extends "base.html" %}
{% block title %}Log in{% endblock %}

{% block sample_banner %}{% endblock %}

{% block content %}
<section class="page-intro">
  <h1>Log in</h1>
  <p class="page-meta">Your own captured data is only visible after you log in.</p>
</section>

{% if error %}
<section class="skipped-notice" role="alert">{{ error }}</section>
{% endif %}

<form method="post" action="/login" class="upload-form">
  <div class="upload-field">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" autocomplete="email" required autofocus>
  </div>
  <div class="upload-field">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" required>
  </div>
  <button type="submit" class="btn-primary">Log in</button>
</form>
<p class="page-meta"><a href="/reset-password">Forgot your password?</a></p>
{% endblock %}
